capture:
  enabled: false
  use_windivert: false
  windivert_filter: outbound and (tcp or udp)

tcp:
  enabled: true
  listen_host: 127.0.0.1
  listen_port: 19080
  upstream_host: 127.0.0.1
  upstream_port: 29080

udp:
  enabled: true
  listen_host: 127.0.0.1
  listen_port: 19081
  upstream_host: 127.0.0.1
  upstream_port: 29081

runtime:
  log_level: debug
  dry_run: false
  max_runtime_seconds: 45

protocol:
  enabled: true
  http_enabled: true

https_mitm:
    enabled: true
  ca_cert_path: cert/ca/root_ca.crt
  ca_key_path: cert/ca/root_ca.key
  ca_subject_name: NetworkProxy Local CA
  install_to_current_user: false
  cert_cache_dir: cert/cache
    openssl_bin_path: C:\Program Files\OpenSSL-Win64\bin\openssl.exe
  plaintext_test_mode: false

patch:
  enable_text_patch: true
  enable_hex_patch: false
  add_proxy_header: true
  append_debug_suffix: false
  outbound_find: hello
  outbound_replace: patched_hello
  inbound_find: world
  inbound_replace: patched_world
  outbound_find_hex: ""
  outbound_replace_hex: ""
  inbound_find_hex: ""
  inbound_replace_hex: ""
